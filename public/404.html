<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Agent Nav Test</title>
    <script>
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      //
      // GitHub Pages is a static host: it has no server-side rewrite rule to
      // hand every path (e.g. /Agent-Nav-Testing/option-02) to index.html, so
      // a direct link or a page refresh on one of those URLs 404s. GitHub
      // Pages does serve this 404.html for any unmatched path, though — so
      // this re-encodes the attempted path into a query string and redirects
      // to the site root, where index.html's own matching decode script
      // (see index.html) restores it via history.replaceState before the app
      // ever renders. `pathSegmentsToKeep = 1` preserves the
      // "/Agent-Nav-Testing" project-page prefix itself.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
